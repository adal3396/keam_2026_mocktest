  <body>
    <div id="root">
      <style>
        .initial-loader {
          position: fixed; inset: 0; display: flex; flex-direction: column;
          align-items: center; justify-content: center; background-color: white;
          color: black; font-family: sans-serif;
        }
        .initial-loader img {
          width: auto; height: 64px; max-width: 240px; object-fit: contain;
          animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
          0%, 100% { opacity: 1; transform: scale(1); }
          50% { opacity: .5; transform: scale(0.95); }
        }
      </style>
      <div class="initial-loader">
        <img src="/ksu-logo-tall.png" alt="Loading..." />
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
